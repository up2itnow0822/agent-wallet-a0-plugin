name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install dependencies
        run: |
          pip install flake8 pyyaml
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Syntax check (Python)
        run: find . -name "*.py" ! -path "./.git/*" -exec python3 -m py_compile {} +
      - name: Lint (flake8)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Validate YAML
        run: |
          python3 -c "
          import yaml, glob, sys
          errors = []
          for f in glob.glob('**/*.yaml', recursive=True) + glob.glob('**/*.yml', recursive=True):
              if '.git' in f: continue
              try:
                  yaml.safe_load(open(f))
              except yaml.YAMLError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors)); sys.exit(1)
          print(f'All YAML files valid')
          "
